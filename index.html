<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSE CAff by onkiponkizuzuzu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;400;600&family=Merriweather:wght@100;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        :root { --bg: #f8fafc; --text: #0f172a; --border: #e2e8f0; --sidebar: #ffffff; color-scheme: light; }
        .dark { --bg: #0f172a; --text: #f1f5f9; --border: #334155; --sidebar: #1e293b; color-scheme: dark; }
        body { font-family: 'Inter', sans-serif; transition: all 0.3s; margin: 0; min-height: 100vh; }
        .article-card { scroll-margin-top: 80px; border-bottom: 1px solid var(--border); padding-bottom: 1rem; margin-bottom: 1.5rem; width: 100%; }
        #sidebar { transition: all 0.3s ease; width: 280px; position: sticky; top: 60px; height: calc(100vh - 60px); overflow-y: auto; z-index: 30; }
        #sidebar.collapsed { width: 0; padding: 0; overflow: hidden; border: none; }
        .article-title { font-size: 1.1rem; line-height: 1.4rem; font-weight: 600; cursor: pointer; transition: color 0.2s; flex: 1; }
        .article-title:hover { color: #3b82f6; }
        .content-body { font-family: 'Merriweather', serif; font-size: 1.1rem; line-height: 1.8; max-width: 800px; margin: 0 auto; }
        .content-body strong, .content-body b { font-weight: 700; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .gemini-input-area { border-radius: 28px; background: #f0f4f9; padding: 4px 12px; display: flex; align-items: center; border: 1px solid transparent; }
        .dark .gemini-input-area { background: #1e1f20; border-color: #444746; }
        .gemini-textarea { background: transparent; border: none; outline: none; width: 100%; resize: none; padding: 10px; font-size: 14px; max-height: 100px; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#0f172a] text-gray-900 dark:text-gray-100">

    <div id="auth-overlay">
        <div class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-2xl max-w-md w-full mx-4 border border-gray-200 dark:border-gray-700">
            <h2 class="text-2xl font-bold mb-6 text-center">Authorized Access Only</h2>
            <div id="auth-error" class="hidden mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm text-center"></div>
            <div class="space-y-4">
                <input type="email" id="email-input" placeholder="Email" class="w-full px-4 py-2 rounded-xl border dark:bg-gray-700 outline-none">
                <input type="password" id="password-input" placeholder="Password" class="w-full px-4 py-2 rounded-xl border dark:bg-gray-700 outline-none" onkeypress="if(event.key==='Enter')handleLogin()">
                <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-xl transition-colors">Log In</button>
            </div>
        </div>
    </div>

    <div id="app-content" class="hidden">
        <nav class="sticky top-0 z-40 px-4 py-2 border-b shadow-sm bg-white dark:bg-[#1e293b] border-gray-200 dark:border-gray-700 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <button onclick="toggleSidebar()" class="p-1.5 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800"><i class="fas fa-bars text-lg"></i></button>
                <div>
                    <h1 class="font-bold text-base leading-none">CSE CAff</h1>
                    <div id="prelims-counter" class="text-[10px] text-blue-600 mt-1">Days to Prelims: <span id="days-count">...</span></div>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <select id="topic-select" onchange="switchTopic(this.value)" class="h-[34px] text-sm rounded-lg bg-gray-50 dark:bg-gray-800 px-2 outline-none border border-gray-200 dark:border-gray-700"></select>
                <select id="subtopic-select" onchange="switchSubtopic(this.value)" class="h-[34px] text-sm rounded-lg bg-gray-50 dark:bg-gray-800 px-2 outline-none border border-gray-200 dark:border-gray-700"></select>
            </div>
            <div class="flex items-center gap-2">
                <input type="text" id="searchInput" onkeyup="handleSearch()" placeholder="Search..." class="h-[34px] pl-4 pr-2 rounded-xl border dark:bg-gray-800 text-sm outline-none">
                <button onclick="promptForKey()" title="Key" class="p-2"><i class="fas fa-key text-purple-500"></i></button>
                <button onclick="toggleDarkMode()" title="Theme" class="p-2"><i id="theme-icon" class="fas fa-moon"></i></button>
                <button onclick="showArchivedView()" title="Archived" class="p-2"><i class="fas fa-archive"></i></button>
                <button onclick="handleLogout()" title="Logout" class="p-2 text-red-500"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </nav>

        <div class="flex">
            <aside id="sidebar" class="border-r p-6 hidden md:block collapsed bg-white dark:bg-[#1e293b]">
                <h3 class="text-xs font-bold uppercase opacity-40 mb-6 tracking-widest">Articles By Date</h3>
                <div id="date-list" class="space-y-1"></div>
            </aside>
            <main class="flex-1 px-4 md:px-12 py-8 min-h-screen bg-slate-50 dark:bg-[#0f172a]">
                <div id="article-feed" class="max-w-3xl mx-auto"></div>
            </main>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDY3HiW87T204-6jTpSwZp72QkzYe4jz2o", authDomain: "csecaffreader.firebaseapp.com", projectId: "csecaffreader", storageBucket: "csecaffreader.firebasestorage.app", messagingSenderId: "478819279571", appId: "1:478819279571:web:d8956a3156960747776a26" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const authOverlay = document.getElementById('auth-overlay'), appContent = document.getElementById('app-content'), sidebar = document.getElementById('sidebar'), feed = document.getElementById('article-feed');
        let rawData = [], activeTopic = 'The Hindu', activeSubtopic = 'Environment', isArchiveView = false, archivedUrls = JSON.parse(localStorage.getItem('archivedUrls') || '[]');

        const topics = { "The Hindu": ["Science", "Health", "Agriculture", "Environment", "Internet"], "Indian Express": ["UPSC Quizzes", "UPSC Current Affairs"] };

        auth.onAuthStateChanged(user => { if (user) { appContent.classList.remove('hidden'); authOverlay.classList.add('hidden'); initApp(); } else { appContent.classList.add('hidden'); authOverlay.classList.remove('hidden'); } });

        async function initApp() {
            const res = await fetch('data.json');
            rawData = await res.json();
            rawData.sort((a, b) => b.date.localeCompare(a.date));
            const prelimsDate = new Date("May 24, 2026").getTime();
            document.getElementById("days-count").innerText = Math.floor((prelimsDate - new Date().getTime()) / 86400000);
            renderTopicTabs();
            renderView('The Hindu', 'Environment');
        }

        function renderTopicTabs() {
            document.getElementById('topic-select').innerHTML = Object.keys(topics).map(t => `<option value="${t}" ${activeTopic === t ? 'selected' : ''}>${t}</option>`).join('');
            renderSubtopicTabs();
        }

        function renderSubtopicTabs() {
            document.getElementById('subtopic-select').innerHTML = topics[activeTopic].map(s => `<option value="${s}" ${activeSubtopic === s ? 'selected' : ''}>${s}</option>`).join('');
        }

        function renderDateSidebar() {
            const viewArts = isArchiveView ? rawData.filter(a => archivedUrls.includes(a.url)) : rawData.filter(a => a.category === activeSubtopic && !archivedUrls.includes(a.url));
            const grouped = {};
            viewArts.forEach(a => { if(!grouped[a.date]) grouped[a.date] = []; grouped[a.date].push(a); });
            document.getElementById('date-list').innerHTML = Object.keys(grouped).sort((a,b)=>b.localeCompare(a)).map(d => `<div class="font-bold text-blue-600 mt-4 mb-1 text-[10px] uppercase">${d}</div>` + grouped[d].map(art => {
                const safeId = 'art_' + encodeURIComponent(art.url).replace(/[^a-zA-Z0-9]/g, '');
                return `<button onclick="document.getElementById('${safeId}').scrollIntoView({behavior:'smooth'})" class="block w-full text-left text-[11px] truncate text-gray-500 mb-1 hover:text-blue-500">${art.title}</button>`
            }).join('')).join('');
        }

        function renderView(topic, subtopic) {
            isArchiveView = false; activeTopic = topic; activeSubtopic = subtopic;
            renderTopicTabs();
            renderFeed(rawData.filter(a => a.category === subtopic && !archivedUrls.includes(a.url)));
            renderDateSidebar();
        }

        function showArchivedView() {
            isArchiveView = true;
            renderFeed(rawData.filter(a => archivedUrls.includes(a.url)), "Archived Articles");
            renderDateSidebar();
        }

        function toggleArchive(url) {
            if (archivedUrls.includes(url)) archivedUrls = archivedUrls.filter(u => u !== url);
            else archivedUrls.push(url);
            localStorage.setItem('archivedUrls', JSON.stringify(archivedUrls));
            isArchiveView ? showArchivedView() : renderView(activeTopic, activeSubtopic);
        }

        function toggleArticle(id) {
            const c = document.getElementById('content-' + id), i = document.getElementById('icon-' + id);
            c.style.display = c.style.display === 'none' ? 'block' : 'none';
            i.className = c.style.display === 'none' ? 'fas fa-chevron-down' : 'fas fa-chevron-up';
        }

        async function executeGemini(id, url) {
            const key = localStorage.getItem('GEMINI_API_KEY');
            if (!key) return alert("Enter API Key first");
            const input = document.getElementById('gemini-input-'+id);
            const cmd = input.value || input.placeholder;
            const article = rawData.find(a => a.url === decodeURIComponent(url));
            let text = article.content.map(c => c.value || (c.question + c.solution)).join(' ');
            const out = document.getElementById('gemini-out-'+id);
            const icon = document.getElementById('gemini-icon-'+id);
            document.getElementById('gemini-box-'+id).classList.remove('hidden');
            out.innerHTML = "Asking Gemini..."; icon.innerText = "progress_activity"; icon.classList.add('animate-spin');
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: cmd + "\n\nContent:\n" + text }] }] })
                });
                const d = await res.json();
                out.innerHTML = d.candidates[0].content.parts[0].text.replace(/\n/g, '<br>').replace(/\*(.*?)\n/g, '<li>$1</li>');
            } catch (e) { out.innerHTML = "Error: " + e.message; }
            icon.innerText = "send"; icon.classList.remove('animate-spin');
        }

        function renderFeed(arts, title = null) {
            feed.innerHTML = (title ? `<h2 class="text-xl font-bold mb-4 opacity-40">${title}</h2>` : "") + arts.map(art => {
                const safeId = 'art_' + encodeURIComponent(art.url).replace(/[^a-zA-Z0-9]/g, '');
                let topicPath = "Unknown";
                for (let t in topics) if(topics[t].includes(art.category)) topicPath = t;
                const isArchived = archivedUrls.includes(art.url);

                return `<article id="${safeId}" class="article-card">
                    <div onclick="toggleArticle('${safeId}')" class="flex justify-between items-start cursor-pointer">
                        <h2 class="article-title">${art.title}</h2>
                        <div class="flex items-center gap-4">
                            <button onclick="event.stopPropagation(); toggleArchive('${art.url}')" class="text-gray-400 hover:text-blue-500">
                                <i class="fas ${isArchived ? 'fa-box-open text-blue-500' : 'fa-archive'}"></i>
                            </button>
                            <i id="icon-${safeId}" class="fas fa-chevron-down text-blue-500"></i>
                        </div>
                    </div>
                    <div id="content-${safeId}" class="content-body mt-4" style="display:none">
                        ${art.content.map(c => c.type === 'quiz_item' ? 
                            `<div class="mb-6">
                                <div class="font-semibold">${c.question}</div>
                                <details class="mt-3 bg-slate-100 dark:bg-slate-800 rounded-lg p-3">
                                    <summary class="cursor-pointer font-bold text-blue-500">Show Answer</summary>
                                    <div class="mt-2 text-sm">${c.solution}</div>
                                </details>
                            </div>` : `<p>${c.value}</p>`
                        ).join('')}
                        <div class="mt-6">
                            <div class="gemini-input-area">
                                <img width="24" src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/Gemini_sparkle_v002.svg/40px-Gemini_sparkle_v002.svg.png">
                                <textarea id="gemini-input-${safeId}" class="gemini-textarea" placeholder="Provide a UPSC-ready summary of the content in 300 words in bullet points without missing key details."></textarea>
                                <button onclick="executeGemini('${safeId}', '${encodeURIComponent(art.url)}')" class="p-2"><span id="gemini-icon-${safeId}" class="material-symbols-outlined">send</span></button>
                            </div>
                            <div id="gemini-box-${safeId}" class="hidden mt-4 p-5 bg-purple-50 dark:bg-purple-900/20 rounded-2xl text-sm font-bold border border-purple-100">
                                <div id="gemini-out-${safeId}"></div>
                            </div>
                        </div>
                        <div class="mt-4 pt-4 border-t text-[10px] text-gray-400">${topicPath} / ${art.category} | ${art.date}</div>
                    </div>
                </article>`;
            }).join('');
        }

        function promptForKey() { const k = prompt("Gemini API Key:", localStorage.getItem('GEMINI_API_KEY')||""); if(k) localStorage.setItem('GEMINI_API_KEY', k); }
        function toggleSidebar() { sidebar.classList.toggle('collapsed'); }
        function toggleDarkMode() { document.documentElement.classList.toggle('dark'); }
        function handleLogout() { auth.signOut(); }
        function handleLogin() { const e=document.getElementById('email-input').value, p=document.getElementById('password-input').value; auth.signInWithEmailAndPassword(e,p).catch(err=>alert(err.message)); }
    </script>
</body>
</html>
