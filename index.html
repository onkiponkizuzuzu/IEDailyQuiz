<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSE CAff by onkiponkizuzuzu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;400;600&family=Merriweather:wght@100;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Your existing styles and scripts remain the same until the nav part -->
    <!-- ... keep all your previous <style> and scripts ... -->
</head>
<body>
    <!-- Your auth overlay remains the same -->

    <div id="app-content" class="hidden">
        <nav class="sticky top-0 z-40 px-4 py-2 border-b shadow-sm bg-white dark:bg-[#1e293b] border-gray-200 dark:border-gray-700">
            <div class="flex items-center justify-between">
                <!-- Fixed Hamburger Button -->
                <button onclick="toggleSidebar()" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                    <i class="fas fa-bars text-2xl text-gray-700 dark:text-gray-200"></i>
                </button>

                <!-- Rest of your nav (topic select, search, buttons etc.) remains exactly as before -->
                <!-- ... your existing nav content ... -->
            </div>
        </nav>

        <div class="flex">
            <aside id="sidebar" class="border-r p-6 hidden md:block collapsed bg-white dark:bg-[#1e293b] border-gray-200 dark:border-gray-700">
                <h3 class="text-xs font-bold uppercase opacity-40 mb-6 tracking-widest text-gray-900 dark:text-gray-400">Navigation</h3>
                <div id="date-list" class="space-y-1"></div>
            </aside>
            <main class="flex-1 px-4 md:px-12 py-8 min-h-screen bg-slate-50 dark:bg-[#0f172a]">
                <div id="article-feed" class="max-w-3xl mx-auto"></div>
            </main>
        </div>
    </div>

    <script>
        // Your entire previous script remains the same, except ensure this function exists:
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
        }

        // Auto-collapse after 10s mouse away (optional, as you liked before)
        let sidebarTimeout = null;
        const sidebar = document.getElementById('sidebar');
        sidebar.addEventListener('mouseleave', () => {
            sidebarTimeout = setTimeout(() => sidebar.classList.add('collapsed'), 10000);
        });
        sidebar.addEventListener('mouseenter', () => clearTimeout(sidebarTimeout));

        window.onload = () => {
            sidebar.classList.add('collapsed');   // collapsed by default
            // ... your existing onload code ...
        };
    </script>
</body>
</html>
